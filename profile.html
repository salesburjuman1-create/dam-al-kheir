    <style>
        body { background: var(--gray-100); }
        .profile-page { padding: 40px 0; min-height: 100vh; }
        .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
        .pcard { background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow: hidden; }
        .pcard-top { background: linear-gradient(135deg, var(--red-dark), var(--red)); padding: 32px 24px; text-align: center; }
        .p-avatar { width: 88px; height: 88px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 900; color: white; margin: 0 auto 14px; overflow: hidden; }
        .p-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .p-name  { font-size: 1.1rem; font-weight: 800; color: white; margin-bottom: 6px; }
        .p-blood { display: inline-block; padding: 4px 14px; background: rgba(255,255,255,0.2); color: white; border-radius: 50px; font-size: 0.875rem; font-weight: 700; margin-bottom: 6px; }
        .p-city  { font-size: 0.82rem; color: rgba(255,255,255,0.75); }
        .pcard-body { padding: 20px; }
        .pstat-row { display: flex; justify-content: space-around; padding: 14px 0; border-bottom: 1px solid var(--gray-200); margin-bottom: 16px; }
        .pstat { text-align: center; }
        .pstat-num { font-size: 1.4rem; font-weight: 900; color: var(--gray-900); }
        .pstat-lbl { font-size: 0.7rem; color: var(--gray-400); margin-top: 2px; }
        .p-info-list { display: flex; flex-direction: column; gap: 10px; }
        .p-info-item { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; color: var(--gray-600); }
        .p-info-icon { width: 32px; height: 32px; background: var(--red-faint); color: var(--red); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; }
        .avail-btn { width: 100%; padding: 10px; border-radius: 50px; border: none; font-family: 'Cairo',sans-serif; font-size: 0.875rem; font-weight: 700; cursor: pointer; margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition); }
        .avail-on  { background: #DCFCE7; color: #16A34A; }
        .avail-off { background: #FEE2E2; color: var(--red); }
        .logout-btn { width: 100%; padding: 11px; background: #FEE2E2; color: var(--red); border: none; border-radius: 50px; font-family: 'Cairo',sans-serif; font-size: 0.875rem; font-weight: 700; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition); }
        .logout-btn:hover { background: var(--red); color: white; }
        .section-card { background: white; border-radius: var(--radius-lg); padding: 28px; border: 1px solid var(--gray-200); margin-bottom: 20px; }
        .section-card-title { font-size: 1rem; font-weight: 800; color: var(--gray-900); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--red-faint); display: flex; align-items: center; gap: 8px; }
        .section-card-title i { color: var(--red); }
        .my-req-item { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: var(--gray-100); border-radius: var(--radius); margin-bottom: 8px; border: 1px solid var(--gray-200); }
        .my-req-blood { width: 44px; height: 44px; background: var(--red); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; flex-shrink: 0; }
        .my-req-info h4 { font-size: 0.875rem; font-weight: 700; color: var(--gray-900); }
        .my-req-info span { font-size: 0.75rem; color: var(--gray-400); }
        @media(max-width:768px){ .profile-layout { grid-template-columns: 1fr; } }
    </style>
</head>

    <script>
        let currentUid = null;
        let currentData = {};

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'login.html'; return; }
            currentUid = user.uid;
            await loadProfile(user);
        });

        async function loadProfile(user) {
            try {
                const doc = await db.collection('users').doc(user.uid).get();
                const d   = doc.exists ? doc.data() : {};
                currentData = d;

                // Avatar — نقرأ من Firestore أولاً ثم Firebase Auth
                const av = document.getElementById('pAvatar');
                const photoSrc = d.photoURL || user.photoURL || '';
                if (photoSrc) {
                    av.innerHTML = `<img src="${photoSrc}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                } else {
                    av.textContent = (d.firstName || d.name || 'U')[0]?.toUpperCase() || 'U';
                }

                // Info
                document.getElementById('pName').textContent   = d.name || user.displayName || '—';
                document.getElementById('pBlood').textContent  = d.bloodType || '؟';
                document.getElementById('pCity').textContent   = d.city || 'غير محدد';
                document.getElementById('pPhone').textContent  = d.phone || 'غير مضاف';
                document.getElementById('pEmail').textContent  = user.email || '—';
                document.getElementById('pAge').textContent    = d.age ? d.age + ' سنة' : '—';
                document.getElementById('pRole').textContent   = d.role === 'donor' ? 'متبرع' : 'محتاج دم';
                document.getElementById('pDonations').textContent = d.totalDonations || 0;

                // Availability
                const isAvail = d.available !== false;
                document.getElementById('availBtn').className = `avail-btn ${isAvail ? 'avail-on' : 'avail-off'}`;
                document.getElementById('availText').textContent = isAvail ? 'متاح للتبرع — اضغط للإيقاف' : 'غير متاح — اضغط للتفعيل';

                // Fill edit form
                const parts = (d.name || '').split(' ');
                document.getElementById('editFirstName').value = d.firstName || parts[0] || '';
                document.getElementById('editLastName').value  = d.lastName  || parts.slice(1).join(' ') || '';
                document.getElementById('editPhone').value     = d.phone || '';
                document.getElementById('editAge').value       = d.age || '';
                document.getElementById('editRole').value      = d.role || 'donor';
                for (let opt of document.getElementById('editCity').options) {
                    if (opt.value === d.city) { opt.selected = true; break; }
                }
                loadMyDonations(user.uid)
                if (d.bloodType) {
                    document.querySelectorAll('.blood-type-btn').forEach(btn => {
                        if (btn.textContent.trim() === d.bloodType) btn.classList.add('selected');
                    });
                }

                await loadMyRequests(user.uid);
                document.getElementById('profileLoading').style.display = 'none';
                document.getElementById('profileLayout').style.display  = 'grid';
            } catch(e) {
                console.error(e);
                showToast('خطأ في تحميل الملف الشخصي', 'error');
            }
        }

        async function loadMyRequests(uid) {
            try {
                const snap = await db.collection('blood_requests')
                    .where('userId','==',uid).orderBy('createdAt','desc').limit(10).get();
                document.getElementById('pRequestsCount').textContent = snap.size;
                const list = document.getElementById('myRequestsList');
                if (snap.empty) {
                    list.innerHTML = '<p style="text-align:center;color:var(--gray-400);font-size:0.875rem;padding:16px">لا توجد طلبات سابقة</p>';
                    return;
                }
                const statusColor = { active:'var(--red)', fulfilled:'#16A34A', cancelled:'var(--gray-400)' };
                const statusLabel = { active:'نشط', fulfilled:'مكتمل', cancelled:'ملغي' };
                list.innerHTML = snap.docs.map(d => {
                    const r = d.data();
                    const sc = statusColor[r.status]||'var(--red)';
                    const sl = statusLabel[r.status]||'نشط';
                    return `<div class="my-req-item">
                        <div class="my-req-blood">${r.bloodType}</div>
                        <div class="my-req-info" style="flex:1">
                            <h4>${r.hospital||'—'} — ${r.city||''}</h4>
                            <span>${r.createdAt ? formatArabicTime(r.createdAt) : ''}</span>
                        </div>
                        <span style="padding:4px 12px;background:${sc}22;color:${sc};border-radius:50px;font-size:0.75rem;font-weight:700">${sl}</span>
                    </div>`;
                }).join('');
            } catch(e) {
                document.getElementById('myRequestsList').innerHTML = '<p style="color:var(--gray-400);font-size:0.82rem;padding:12px">تعذر تحميل الطلبات</p>';
            }
        }

        async function loadMyDonations(uid) {
    const list = document.getElementById('myDonationsList');
    try {
        const snap = await db.collection('donations')
            .where('userId','==',uid).orderBy('date','desc').limit(10).get();
        if (snap.empty) {
            list.innerHTML = '<p style="text-align:center;color:var(--gray-400);font-size:0.875rem;padding:16px">لم تُسجَّل تبرعات بعد</p>';
            return;
        }
        list.innerHTML = snap.docs.map(d => {
            const r = d.data();
            return `<div class="my-req-item">
                <div class="my-req-blood" style="background:#16A34A">${r.bloodType||'؟'}</div>
                <div class="my-req-info" style="flex:1">
                    <h4>${r.hospital||'—'} — ${r.city||''}</h4>
                    <span>${r.date ? new Date(r.date.seconds*1000).toLocaleDateString('ar-IQ') : '—'}</span>
                </div>
                <span style="padding:4px 12px;background:#DCFCE7;color:#16A34A;border-radius:50px;font-size:0.75rem;font-weight:700">مكتمل</span>
            </div>`;
        }).join('');
    } catch(e) {
        list.innerHTML = '<p style="color:var(--gray-400);font-size:0.82rem;padding:12px">لا توجد سجلات تبرع</p>';
    }
}

        async function saveProfile() {
            const btn = document.querySelector('.section-card .btn-submit');
            const firstName = document.getElementById('editFirstName').value.trim();
            const lastName  = document.getElementById('editLastName').value.trim();
            const phone     = document.getElementById('editPhone').value.trim();
            const age       = document.getElementById('editAge').value;
            const city      = document.getElementById('editCity').value;
            const role      = document.getElementById('editRole').value;
            const bloodType = document.querySelector('.blood-type-btn.selected')?.textContent?.trim() || currentData.bloodType || '';

            if (!firstName) return showToast('يرجى إدخال الاسم الأول', 'error');
            if (!phone)     return showToast('يرجى إدخال رقم الهاتف', 'error');

            showLoading(btn, 'جاري الحفظ...');
            try {
                const updated = {
                    firstName, lastName, phone, city, role, bloodType,
                    age: parseInt(age)||0,
                    name: `${firstName} ${lastName}`.trim(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                await db.collection('users').doc(currentUid).set(updated, {merge:true});
                if (role === 'donor') {
                    await db.collection('donors').doc(currentUid).set({...updated, uid:currentUid}, {merge:true});
                }
                document.getElementById('pName').textContent  = updated.name;
                document.getElementById('pBlood').textContent = bloodType || '؟';
                document.getElementById('pCity').textContent  = city || '—';
                document.getElementById('pPhone').textContent = phone;
                hideLoading(btn);
               showToast('تم حفظ التغييرات بنجاح ✓', 'success');
setTimeout(() => window.location.href = 'index.html', 1500);
            } catch(e) {
                hideLoading(btn);
                showToast('حدث خطأ في الحفظ', 'error');
            }
        }

        const IMGBB_KEY = '5f6aa85734c193cfb5d15484c21a829e';

        async function uploadProfileImage(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) return showToast('الصورة أكبر من 5MB', 'error');

            showToast('جاري رفع الصورة...', 'info');
            try {
                const formData = new FormData();
                formData.append('image', file);
                const res  = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method:'POST', body:formData });
                const data = await res.json();
                if (!data.success) throw new Error('فشل');

                const url = data.data.url;

                // تحديث الـ avatar في الصفحة
                const av = document.getElementById('pAvatar');
                av.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;

                // حفظ في Firestore
                await db.collection('users').doc(currentUid).set({ photoURL: url }, { merge: true });
                if (currentData.role === 'donor') {
                    await db.collection('donors').doc(currentUid).set({ photoURL: url }, { merge: true });
                }
                showToast('تم تحديث الصورة بنجاح ✓', 'success');
            } catch(e) {
                showToast('فشل رفع الصورة، حاول مرة أخرى', 'error');
            }
        }

        async function toggleAvailability() {
            const newVal = !(currentData.available !== false);
            try {
                await db.collection('users').doc(currentUid).update({available: newVal});
                if (currentData.role === 'donor') {
                    await db.collection('donors').doc(currentUid).update({available: newVal});
                }
                currentData.available = newVal;
                document.getElementById('availBtn').className = `avail-btn ${newVal ? 'avail-on' : 'avail-off'}`;
                document.getElementById('availText').textContent = newVal ? 'متاح للتبرع — اضغط للإيقاف' : 'غير متاح — اضغط للتفعيل';
                showToast(newVal ? 'أنت الآن متاح للتبرع ✓' : 'تم إيقاف إتاحتك مؤقتاً', newVal ? 'success' : 'info');
            } catch(e) { showToast('حدث خطأ', 'error'); }
        }
